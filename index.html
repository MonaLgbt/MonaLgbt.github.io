# Arbeitsschutz im Büro

**Rechtliche Bestimmungen – Fokus Büroarbeit**

>*Mit <kbd>Pfeil</kbd>-Tasten navigieren.*

---

## Gesetze sind die Grundlage für den Arbeitsschutz

### Arbeitsschutz-Gesetz

**Verpflichtet Arbeitgeber, Büroarbeitsplätze so zu gestalten, dass Sicherheit und Gesundheit der Beschäftigten gewährleistet sind.**

Zum Beispiel:
- ergonomische Möbel
- sichere Arbeitsmittel

[Mehr Infos](https://www.baua.de/DE/Angebote/Regelwerk)

---

### Arbeits-Sicherheits-Gesetz

**Regelt die Einbindung von Betriebsärzten und Fachkräften für Arbeitssicherheit zur Bewertung von Belastungen im Büro.**

Zum Beispiel:
- Bildschirmarbeit
- Haltungsprobleme

[Mehr Infos](https://www.baua.de/DE/Angebote/Regelwerk)

---

### Arbeitszeit-Gesetz

**Vorgaben zu Arbeitszeit, Pausen und Ruhezeiten.**

Wichtig zum Beispiel:
- zur Prävention von Belastungen bei überwiegend sitzender Büroarbeit

[Mehr Infos](https://info-arbeitsschutz.de/themen/gesetzliche-grundlagen)

---

### Mutterschutz-Gesetz

**Besondere Schutzbestimmungen für Schwangere am Büroarbeitsplatz.**

Zum Beispiel:
- Sitzgelegenheiten
- Gefährdungsbeurteilung

[Mehr Infos](https://info-arbeitsschutz.de/themen/gesetzliche-grundlagen)

---

### Jugend-Arbeitsschutz-Gesetz

**Schutz junger Beschäftigter.**

Zum Beispiel:
- bei Ausbildungsberufen im Bürobereich

[Mehr Infos](https://info-arbeitsschutz.de/themen/gesetzliche-grundlagen)

---

## Verordnungen konkretisieren die Gesetze

### Arbeitsstätten-Verordnung

**Zentrale Vorschrift für Büroarbeitsplätze.**

Zum Beispiel:
- Anforderungen an Raumgröße, Beleuchtung, Klima, Verkehrswege  
- Regeln für Bildschirm- und Büroarbeitsplätze  
- Ergonomie (z. B. Stuhl, Tisch, Bildschirmhöhe)  

[Mehr Infos](https://www.vbg.de/cms/arbeitsschutz/arbeitsschutz-organisieren/verantwortung-des-unternehmens-und-rechtliche-grundlagen/vorschriften-regeln-arbeitsschutz)

---

### Betriebs-Sicherheits-Verordnung

**Sicherheit technischer Arbeitsmittel im Büro.**

Zum Beispiel:
- elektrische Arbeitsmittel (z. B. Computer, Drucker)  
- regelmäßige Prüfungen durch befähigte Personen  

[Mehr Infos](https://www.vbg.de/cms/arbeitsschutz/arbeitsschutz-organisieren/verantwortung-des-unternehmens-und-rechtliche-grundlagen/vorschriften-regeln-arbeitsschutz)

---

### Gefahrstoff-Verordnung

**Relevanz im Büro.**

Zum Beispiel:
- Tonern und Druckeremissionen
- Reinigungsmitteln

[Mehr Infos](https://www.vbg.de/cms/arbeitsschutz/arbeitsschutz-organisieren/verantwortung-des-unternehmens-und-rechtliche-grundlagen/vorschriften-regeln-arbeitsschutz)

---

### Verordnung zur arbeitsmedizinischen Vorsorge

**Vorsorgeangebote bei Bildschirmarbeit.**

Zum Beispiel:
- Untersuchung der Augen und des Sehvermögens

[Mehr Infos](https://www.baua.de/DE/Angebote/Regelwerk)

---

## Zusätzliche Vorschriften sind für Büros besonders wichtig

### Technische Regeln für Arbeitsstätten (ASR)

**Konkrete Vorgaben für Büroarbeitsplätze.**

Zum Beispiel:
- ASR A1.2: Raumabmessungen und Bewegungsflächen
- ASR A3.4: Beleuchtung
- ASR A3.5: Raumtemperatur

(Basieren auf ArbStättV-Regelwerk der BAuA)

[Mehr Infos](https://www.baua.de/DE/Angebote/Regelwerk)

---

### DGUV Vorschrift 1 – Grundsätze der Prävention

**Allgemeine Unfallverhütung.**

Zum Beispiel:
- ergonomisches Arbeiten
- sichere Arbeits-Organisation im Büro

[Mehr Infos](https://www.vbg.de/cms/arbeitsschutz/arbeitsschutz-organisieren/verantwortung-des-unternehmens-und-rechtliche-grundlagen/vorschriften-regeln-arbeitsschutz)

---
