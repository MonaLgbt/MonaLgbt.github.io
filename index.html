# Gefährdungen im Büro  
## Überblick für die Gefährdungsbeurteilung
*Mit <kbd>Pfeil</kbd>-Tasten navigieren.*

---

## Ergonomische Gefährdungen

- Falsche Sitzhaltung  
- Ungeeignete Tisch- und Stuhlhöhe  
- Nicht ergonomische Maus/Tastatur  
- Falsch eingestellter Monitor  
- Langes Sitzen ohne Bewegung  

--
### Mögliche Folgen

- Rücken- und Nackenschmerzen  
- Verspannungen  
- Sehnenscheidenentzündungen  
- Kopfschmerzen  
- Ermüdung

---

## Gefährdungen durch Bildschirmarbeit

- Augenbelastung & Ermüdung  
- Trockene Augen  
- Blendung durch falsche Beleuchtung  
- Kopfschmerzen  
- Blaulichtbelastung

--
### Maßnahmen

- 20-20-20-Regel  
- Blendfreie Beleuchtung  
- Richtige Monitorhöhe  
- Regelmäßige kurze Pausen  

---

## Elektrische Gefährdungen

- Defekte Kabel oder Stecker  
- Überlastete Mehrfachsteckdosen  
- Stolperfallen durch lose Leitungen  
- Nicht geprüfte Elektrogeräte (DGUV V3)

--
### Maßnahmen

- Sichtprüfung vor Nutzung  
- Kabelmanagement  
- Nur geprüfte Geräte verwenden

---

## Brand- und Brandschutzrisiken

- Überhitzte Netzteile oder Ladegeräte  
- Papierstau im Drucker/Kopierer  
- Zugestellte Fluchtwege  
- Fehlende Feuerlöscher oder Rauchmelder  

--
### Maßnahmen

- Geräte nicht abdecken  
- Ordnung halten  
- Fluchtwege freihalten  
- Regelmäßige Brandschutzunterweisung  

---

## Mechanische Gefährdungen

- Stolpern oder Ausrutschen  
- Loses Kabel oder Teppichkanten  
- Schnittverletzungen durch Papier  
- Einklemmgefahr bei Schubladen

---

## Chemische Gefährdungen

- Tonerstaub  
- Ausdünstungen von Klebern  
- Reinigungsmittel

---

## Biologische Gefährdungen

- Schimmelbildung  
- Verkeimte Klimaanlagen  
- Krankheitsübertragung in Großraumbüros

---

## Raumklima & Umgebungsfaktoren

- Zu trockene Luft  
- Zugluft  
- Zu hohe oder zu niedrige Temperaturen  
- Schlechte Belüftung → Konzentrationsprobleme  

---

## Lärmbelastung im Büro

- Telefone  
- Gespräche  
- Drucker/Kopierer  
- Klimaanlage  

--
### Auswirkungen

- Konzentrationsstörungen  
- Stress  
- Leistungsabfall  

---

## Psychische Belastungen

- Multitasking & ständige Erreichbarkeit  
- Zeitdruck  
- Unterbrechungen  
- Konflikte im Team  
- Über- oder Unterforderung  
- Monotone Tätigkeiten  

---

## Organisatorische Gefährdungen

- Fehlende Unterweisungen  
- Unklare Verantwortlichkeiten  
- Unaufgeräumte Arbeitsplätze  
- Unklare Ablagesysteme  

---

## Zusammenfassung

- Ergonomie ist der größte Risikofaktor  
- Viele Gefährdungen wirken „unscheinbar“  
- Kleine Maßnahmen → große Wirkung  
- Ziel: Gesundheit, Sicherheit & Produktivität  

---
